<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Tontaza</title>
    <style>
        /* =========================================
           CONFIGURACIÓN GENERAL
        ========================================= */
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #000;
            --fl-speed: 0.8s;
            --speed-leaf: 2s;
        }

        body {
            background-color: var(--dark-color);
            color: #fff;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
            cursor: default;
        }

        /* =========================================
           ESTILO DEL BOTÓN DE INICIO
        ========================================= */
        #overlay-inicio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .btn-comenzar {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            line-height: 1.2; /* <-- ESTA ES LA ÚNICA LÍNEA NUEVA PARA JUNTAR EL TEXTO */
            background: linear-gradient(45deg, #4ca9df, #f391bd);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(243, 145, 189, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-comenzar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(76, 169, 223, 0.8);
        }

        .texto-click {
            margin-top: 20px;
            color: #4ca9df;
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: parpadeo 2s infinite;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 0.3;
            }
            50% { opacity: 1;
            }
        }

        /* Ocultar contenido hasta que se pulse el botón */
        .not-loaded .flowers, 
        .not-loaded .birthday-card, 
        .not-loaded .special-text,
        .not-loaded .overlay,
        .not-loaded .fireworks-container,
        .not-loaded .shooting-stars,
        .not-loaded canvas {
         
            display: none;
        }

        /* =========================================
           FONDOS Y ESTRELLAS
        ========================================= */
        .night {
            position: fixed;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            filter: blur(0.1vmin);
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
                              radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 233, 255, 0.2)),
                              repeating-linear-gradient(220deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px),
               
                               repeating-linear-gradient(189deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px),
                              repeating-linear-gradient(148deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px),
                              linear-gradient(90deg, 
            rgb(0, 255, 250), rgb(240, 240, 240));
            z-index: -2;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1; 
        }

        .shooting-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shooting-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: shootingStar 3s linear infinite;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 100%);
            animation: shootingStarTail 3s linear infinite;
        }

        .shooting-star:nth-child(1) { top: 5%; left: -10%; animation-delay: 0s; animation-duration: 2.5s;
        }
        .shooting-star:nth-child(2) { top: 15%; left: -10%; animation-delay: 2s; animation-duration: 3s;
        }
        .shooting-star:nth-child(3) { top: 25%; left: -10%; animation-delay: 4s; animation-duration: 2.8s;
        }
        .shooting-star:nth-child(4) { top: 0%; left: -10%; animation-delay: 6s; animation-duration: 3.2s;
        }
        .shooting-star:nth-child(5) { top: 35%; left: -10%; animation-delay: 8s; animation-duration: 2.7s;
        }
        .shooting-star:nth-child(6) { top: 8%; left: -10%; animation-delay: 10s; animation-duration: 3.1s;
        }
        .shooting-star:nth-child(7) { top: 45%; left: -10%; animation-delay: 12s; animation-duration: 2.9s;
        }
        .shooting-star:nth-child(8) { top: 3%; left: -10%; animation-delay: 14s; animation-duration: 3.3s;
        }

        @keyframes shootingStar {
            0% { opacity: 0;
            transform: translateX(0) translateY(0) rotate(45deg); }
            10% { opacity: 1;
            }
            90% { opacity: 1;
            }
            100% { opacity: 0; transform: translateX(120vw) translateY(50vh) rotate(10deg);
            }
        }

        @keyframes shootingStarTail {
            0% { width: 0;
            }
            30% { width: 100px;
            }
            100% { width: 0;
            }
        }

        /* =========================================
           TARJETA DE CUMPLEAÑOS Y TEXTOS
        ========================================= */
        .birthday-card {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8);
        }

        .balloons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .balloon {
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            font-size: 1.5em;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }
        
        .balloon:nth-child(1) { background-color: #d62900;
            color: white; animation-delay: 0.5s; }
        .balloon:nth-child(2) { background-color: #ff9a56; color: white; animation-delay: 0s;
        }
        .balloon:nth-child(3) { background-color: #ffffff; color: black; animation-delay: 1s;
        }
        .balloon:nth-child(4) { background-color: #d362a4; color: white; animation-delay: 0.2s;
        }
        .balloon:nth-child(5) { background-color: #a30262; color: black; animation-delay: 0.7s;
        }
        
        .balloon::after {
            content: '';
            position: absolute;
            background-color: #fff;
            width: 1px;
            height: 40px;
            top: 65px;
            left: 50%;
        }

        .birthday-text h2 {
            font-size: 2em;
            font-weight: 300;
            margin: 0;
            animation: fadeInDown 1.5s ease-out 0.2s backwards;
        }

        .birthday-text h1 {
            font-size: 3em;
            margin: 10px 0 15px;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out 0.5s backwards;
            color: #ffdd00;
        }
        
        .cake {
            font-size: 60px;
            animation: popIn 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) 1s backwards;
        }

        .overlay {
            position: absolute;
            top: 13%;
            left: 0;
            width: 100%;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .center-message {
            font-family: 'Courier New', monospace;
            color: #ff69b4;
            font-size: 2.5rem;
            text-align: center;
            opacity: 0.1;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
            animation: pulse 3s infinite;
        }

        .special-text {
            position: absolute;
            top: 4%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdd00;
            font-family: 'Arial', sans-serif;
            font-size: 3vmin;
            text-shadow: 0 0 1vmin rgba(255, 221, 0, 0.8), 0 0 5px #000;
            z-index: 101;
            opacity: 0;
            animation: fadeIn 3s 1s forwards;
            text-align: center;
            width: 90%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(5deg);
            }
            50% { transform: translateY(-15px) rotate(-5deg);
            }
        }
        @keyframes fadeInDown {
            from { opacity: 0;
            transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from { opacity: 0;
            transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0);
            }
        }
        @keyframes popIn {
            from { opacity: 0;
            transform: scale(0.5); }
            to { opacity: 1; transform: scale(1);
            }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1);
            opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.4;
            }
        }
        @keyframes fadeIn {
            to { opacity: 1;
            }
        }

        /* =========================================
           FUEGOS ARTIFICIALES CSS
        ========================================= */
        .fireworks-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: launch 2s ease-in forwards;
        }

        .firework:nth-child(1) { top: 80%; left: 20%; animation-delay: 0s;
        }
        .firework:nth-child(2) { top: 90%; left: 80%; animation-delay: 1.5s;
        }
        .firework:nth-child(3) { top: 85%; left: 50%; animation-delay: 3s;
        }
        .firework:nth-child(4) { top: 95%; left: 30%; animation-delay: 4.5s;
        }
        .firework:nth-child(5) { top: 80%; left: 70%; animation-delay: 6s;
        }

        @keyframes launch {
            0% { transform: translateY(0);
            opacity: 1; }
            100% {
                transform: translateY(-40vh);
            opacity: 0;
                box-shadow: 
                    0 0 15px 5px #ffdd00, 0 0 15px 5px #ff4444,
                    20px -20px 15px 5px #00ffaa, -20px 20px 15px 5px #44aaff,
                    -40px -10px 15px 5px #ff00ff, 40px 10px 15px 5px #00ff00,
          
                    -30px 30px 15px 5px #ff8800, 30px -30px 15px 5px #aaffff;
            }
        }

        /* =========================================
           FLORES DE TULIPÁN TV GIRL
        ========================================= */
        .flowers {
            position: relative;
            transform: scale(0.65);
            z-index: 10;
        }

        .flower { position: absolute; bottom: 10vmin;
            transform-origin: bottom center; z-index: 50; }

        .flower--1 { animation: moving-flower-1 4s linear infinite;
        }
        .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s;
        }
        .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
        }
        .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
        }
        .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
        }
        .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards;
        }

        .flower--2 { left: 50%; transform: rotate(20deg); animation: moving-flower-2 4s linear infinite;
        }
        .flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s;
        }
        .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards;
        }
        .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards;
        }
        .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards;
        }
        .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards;
        }

        .flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite;
        }
        .flower--3 .flower__line { animation-delay: 0.9s;
        }
        .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
        }
        .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards;
        }
        .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
        }
        .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards;
        }

        .flower--4 { left: -25%; z-index: -6; transform: rotate(10deg);
            animation: moving-flower-4 3.5s linear infinite; }
        .flower--4 .flower__line { height: 90vmin; animation-delay: 1.2s;
        }
        .flower--4 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.8s backwards;
        }
        .flower--4 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.6s backwards;
        }
        .flower--4 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.4s backwards;
        }
        .flower--4 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 2.2s backwards;
        }

        .flower--5 { left: 75%; z-index: -7; transform: rotate(-25deg);
            animation: moving-flower-5 4.5s linear infinite; }
        .flower--5 .flower__line { height: 85vmin; animation-delay: 1.9s;
        }
        .flower--5 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.7s backwards;
        }
        .flower--5 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
        }
        .flower--5 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.3s backwards;
        }
        .flower--5 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
        }

        .flower__leafs { position: relative; animation: blooming-flower 2s backwards;
        }
        .flower__leafs--1 { animation-delay: 1.1s;
        }
        .flower__leafs--2 { animation-delay: 1.4s;
        }
        .flower__leafs--3 { animation-delay: 1.7s;
        }
        .flower__leafs--4 { animation-delay: 2.0s;
        }
        .flower__leafs--5 { animation-delay: 2.0s;
        }

        .flower__leafs::after {
            content: "";
            position: absolute; left: 0; top: 0;
            transform: translate(-50%, -100%); width: 8vmin; height: 8vmin;
            filter: blur(10vmin);
        }

        .flower__leaf {
            position: absolute;
            bottom: 0; left: 50%; width: 9vmin; height: 15vmin;
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            transform-origin: bottom center; opacity: 0.95; z-index: 2;
        }

        .flower__leaf--1 { transform: translate(-50%, -5%) rotate(-22deg);
            z-index: 1; }
        .flower__leaf--2 { transform: translate(-50%, -5%) rotate(22deg);  z-index: 1;
        }
        .flower__leaf--3 { transform: translate(-50%, -10%) rotate(0deg);  z-index: 2;
        }

        .flower__leaf--4, .flower__leaf--5, .flower__leaf--6 {
            width: 7vmin;
            height: 12vmin;
            opacity: 0.9;
            border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
            z-index: 3;
        }

        .flower__leaf--4 { transform: translate(-50%, -8%) rotate(-10deg);
        }
        .flower__leaf--5 { transform: translate(-50%, -8%) rotate(10deg);
        }
        .flower__leaf--6 { transform: translate(-50%, -12%) rotate(0deg);
        }

        .flower__center {
            position: absolute;
            left: -2vmin; top: -2vmin; width: 4vmin; height: 4vmin; border-radius: 50%;
        }

        /* --- COLORES TV GIRL --- */
        .flower--4 .flower__leaf { background: radial-gradient(circle at 50% 20%, #d0efff 0%, #4ca9df 40%, #1a5a8a 100%);
            border: 1.5px solid #4ca9df;
            box-shadow: 0 0 1vmin #d0efff, 0 0 0.5vmin #4ca9df, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }
        .flower--4 .flower__center { background: #1a5a8a; border: 2px solid #a5dcfb;
            border: 1.5px solid #4ca9df;
            box-shadow: 0 0 1vmin #d0efff, 0 0 0.5vmin #4ca9df, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }

        .flower--2 .flower__leaf { background: radial-gradient(circle at 50% 20%, #d0efff 0%, #4ca9df 40%, #1a5a8a 100%);
            border: 1.5px solid #4ca9df;
            box-shadow: 0 0 1vmin #d0efff, 0 0 0.5vmin #4ca9df, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }
        .flower--2 .flower__center { background: #1a5a8a; border: 2px solid #a5dcfb;
            border: 1.5px solid #4ca9df;
            box-shadow: 0 0 1vmin #d0efff, 0 0 0.5vmin #4ca9df, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }

        .flower--1 .flower__leafs::after { background-color: #ffffff;
        }

        .flower--1 .flower__leaf--1, .flower--1 .flower__leaf--3, .flower--1 .flower__leaf--5 {
            background: radial-gradient(circle at 50% 20%, #d0efff 0%, #4ca9df 40%, #1a5a8a 100%);
            border: 1.5px solid #4ca9df;
            box-shadow: 0 0 1vmin #d0efff, 0 0 0.5vmin #4ca9df, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }
        
        .flower--1 .flower__leaf--2, .flower--1 .flower__leaf--4, .flower--1 .flower__leaf--6 {
            background: radial-gradient(circle at 50% 20%, #ffe0f0 0%, #f391bd 40%, #a04070 100%);
            border: 1.5px solid #f391bd;
            box-shadow: 0 0 1vmin #ffe0f0, 0 0 0.5vmin #f391bd, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }

        .flower--1 .flower__leaf--4, .flower--1 .flower__leaf--5, .flower--1 .flower__leaf--6 {
            border-width: 1px;
            box-shadow: 0 0 0.8vmin rgba(255,255,255,0.8), inset 0 0 1vmin rgba(255, 255, 255, 0.5);
        }

        .flower--1 .flower__center {
            background: radial-gradient(circle at 30% 30%, #4ca9df 0%, #f391bd 80%, #ffffff 100%);
            border: 2px solid #ffffff; box-shadow: 0 0 1vmin #ffffff, inset 0 0 1vmin #333;
        }

        .flower--3 .flower__leaf { background: radial-gradient(circle at 50% 20%, #ffe0f0 0%, #f391bd 40%, #a04070 100%);
            border: 1.5px solid #f391bd;
            box-shadow: 0 0 1vmin #ffe0f0, 0 0 0.5vmin #f391bd, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }
        .flower--3 .flower__center { background: #a04070; border: 2px solid #ffc5e0;
            border: 1.5px solid #f391bd;
            box-shadow: 0 0 1vmin #ffe0f0, 0 0 0.5vmin #f391bd, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);}

        .flower--5 .flower__leaf { background: radial-gradient(circle at 50% 20%, #ffe0f0 0%, #f391bd 40%, #a04070 100%);
            border: 1.5px solid #f391bd;
            box-shadow: 0 0 1vmin #ffe0f0, 0 0 0.5vmin #f391bd, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);
        }
        .flower--5 .flower__center { background: #a04070; border: 2px solid #ffc5e0;
            border: 1.5px solid #f391bd;
            box-shadow: 0 0 1vmin #ffe0f0, 0 0 0.5vmin #f391bd, inset 0 0 1.5vmin rgba(255, 255, 255, 0.6);}

        .flower__line {
            height: 55vmin;
            width: 2vmin;
            background-image: linear-gradient(to left, rgb(0, 0, 0, 0.3), transparent, rgba(255, 255, 255, 0.2)),
                              linear-gradient(to top, transparent 10%, #2d5016, #4a7c23, #6b8e23);
            box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.7);
            animation: grow-flower-tree 4s backwards;
        }

        .flower__line__leaf {
            --w: 8vmin;
            --h: calc(var(--w) + 3vmin); position: absolute; top: 20%; left: 90%;
            width: var(--w); height: var(--h); border-top-right-radius: var(--h); border-bottom-left-radius: var(--h);
            background-image: linear-gradient(to top, rgba(45, 80, 22, 0.6), #4a7c23, #6b8e23);
            box-shadow: inset 0 0 1vmin rgba(0, 0, 0, 0.3);
        }

        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg);
        }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg);
        }
        .flower__line__leaf--3, .flower__line__leaf--4 {
            border-top-right-radius: 0;
            border-bottom-left-radius: 0;
            border-top-left-radius: var(--h); border-bottom-right-radius: var(--h);
            left: -460%; top: 12%; transform: rotate(-70deg) rotateY(30deg);
        }
        .flower__line__leaf--4 { top: 40%;
        }

        .flower__light {
            position: absolute;
            bottom: 0vmin; width: 0.8vmin; height: 0.8vmin;
            background-color: #ffdd00; border-radius: 50%; filter: blur(0.1vmin);
            animation: tulip-light 6s linear infinite backwards;
            box-shadow: 0 0 1vmin rgba(255, 221, 0, 0.8);
        }

        .flower__light:nth-child(odd) { background-color: #ffaa00;
        }
        .flower__light--1 { left: -2vmin; animation-delay: 1s;
        }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s;
        }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s;
        }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s;
        }
        .flower__light--5 { left: -1vmin; animation-delay: 1.5s;
        }
        .flower__light--6 { left: -4vmin; animation-delay: 3s;
        }
        .flower__light--7 { left: 3vmin; animation-delay: 2s;
        }
        .flower__light--8 { left: -6vmin; animation-delay: 3.5s;
        }

        @keyframes tulip-light {
            0% { opacity: 0;

    <script>
        // --- FUNCIÓN DEL BOTÓN ---
        function comenzarSorpresa() {
            // 1. Quitar la pantalla de inicio
            const overlay = document.getElementById('overlay-inicio');
 overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 1000);
 // 2. Activar música
            const audio = document.getElementById('musicaFondo');
            audio.play();
 // 3. Cargar animaciones quitando el not-loaded
            document.body.classList.remove('not-loaded');
 // Iniciar dibujo del canvas
            draw();
 }

        // --- SCRIPT DE CANVAS: LLUVIA Y FUEGOS ARTIFICIALES ---
        const canvas = document.getElementById('canvas');
 const ctx = canvas.getContext('2d');
        const fontSize = 16;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
 let columns = Math.floor(canvas.width / (fontSize * 4));
        let drops = new Array(columns).fill(1);
 const colors = ['#D52D00', '#EF7627', '#FF9A56', '#FFFFFF', '#D162A4', '#B55690', '#A30262'];
 // Corazones flotantes
        const hearts = [];
 function createHeart() {
            hearts.push({
                x: Math.random() * canvas.width, y: canvas.height + 20,
                size: 16 + Math.random() * 10, speed: 1 + Math.random() * 1.5,
                opacity: 0.5 + Math.random() * 0.5
            });
 }
        function drawHearts() {
            hearts.forEach((h, index) => {
                ctx.globalAlpha = h.opacity; ctx.font = `${h.size}px monospace`;
                ctx.fillStyle = '#ff69b4'; ctx.fillText("🐈", h.x, h.y);
                h.y -= h.speed;
              
 
                if (h.y < -50) hearts.splice(index, 1);
            });
 ctx.globalAlpha = 1;
        }

        // Fuegos artificiales de Canvas (Interacción al clickear la pantalla)
        document.body.addEventListener("click", () => {
            // Verificamos si ya quitamos el not-loaded para no interferir con el primer clic del botón
            if (!document.body.classList.contains('not-loaded')) {
                for (let i = 0; i < 5; i++) { setTimeout(createExplosion, i 
 * 200); }
            }
        });
 function createExplosion() {
            const count = 30 + Math.floor(Math.random() * 30);
 const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
 const y = Math.random() * canvas.height * 0.5 + canvas.height * 0.1;
 for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
 const speed = Math.random() * 4 + 2;
                fireworks.push({ x, y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)], text: "TE QUIERO MUCHO WE" });
 }
        }

        const fireworks = [];
 function createFirework() {
            const count = 20 + Math.floor(Math.random() * 30);
 const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height / 2;
 for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
 const speed = Math.random() * 3 + 2;
                fireworks.push({ x, y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)] });
 }
        }
        function drawFireworks() {
            fireworks.forEach((p, index) => {
                ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                if (p.text) { ctx.font = 'bold 16px monospace'; ctx.fillText(p.text, p.x, p.y); }
                else { ctx.beginPath(); 
 
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill(); }
                p.x += p.dx; p.y += p.dy; p.alpha -= 0.02;
                if (p.alpha <= 0) fireworks.splice(index, 1);
            });
 ctx.globalAlpha = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
 // Efecto "rastro" o estela
            ctx.fillRect(0, 0, canvas.width, canvas.height);
 drawHearts();
            drawFireworks();
            if (Math.random() > 0.95) createHeart();
            if (Math.random() > 0.98) createFirework();
 for (let i = 0; i < drops.length; i++) {
                const x = i * fontSize * 4;
 const y = drops[i] * fontSize;
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.fillText("TE QUIERO MUCHO WE", x, y);
 if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i] += 0.3;
 }
            requestAnimationFrame(draw);
        }
    </script>
